name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      - name: Verify imports
        run: |
          python -c "from mega_connector import mega_client, mcp_server, cli, config; print('All imports OK')"

      - name: Verify entry points exist
        run: |
          which mega-claude
          which mega-claude-mcp
